name: MatMoETranslator
options:
  bundleIdPrefix: com.example.matmoe
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # The Obj-C++ shim #imports the C++ header from the xcframework.
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    # Xcode 26's debug-dylib build splits the main executable into a thin
    # host binary + a .debug.dylib for faster SwiftUI Previews, but the
    # iOS 26 simulator's installer fails to read the bundle metadata from
    # the host and rejects the install with IXErrorDomain code 13
    # "Missing bundle ID" — even though the .app/Info.plist is perfectly
    # valid. Force the classic single-binary layout for Debug builds.
    ENABLE_DEBUG_DYLIB: NO

packages:
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.3"

targets:
  MatMoETranslator:
    type: application
    platform: iOS
    sources:
      - path: MatMoETranslator
        excludes:
          - Info.plist
      # Resources/ is an ordinary group, NOT type: folder. Folder references
      # ship as opaque blue folders that Xcode's signing step does not
      # enumerate, leaving Info.plist + nested files outside the code
      # signature -> simulator install fails with IXErrorDomain 13
      # "Missing bundle ID" because codesign shows "Info.plist=not bound".
      # Cost: if you drop a new file into Resources/, re-run xcodegen.
      - path: Resources
        optional: true
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.matmoe.MatMoETranslator
        PRODUCT_NAME: MatMoETranslator
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Everything bundle-related is hardcoded inside Info.plist (no $(...)
        # substitution, no auto-generated keys merged in). Disable
        # GENERATE_INFOPLIST_FILE so Xcode 26.3 doesn't try to merge anything
        # on top and end up with no bundle id.
        INFOPLIST_FILE: MatMoETranslator/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: MatMoETranslator/MatMoETranslator-Bridging-Header.h
        # The .xcframework exposes the C API header at its slice Headers/ root.
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Frameworks/SlmEngine.xcframework/Headers
          - $(SRCROOT)/Frameworks/SlmEngine.xcframework/ios-arm64/Headers
          - $(SRCROOT)/Frameworks/SlmEngine.xcframework/ios-arm64-simulator/Headers
          - $(SRCROOT)/Frameworks/SlmEngine.xcframework/ios-arm64_x86_64-simulator/Headers
        OTHER_LDFLAGS:
          - -lc++
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: Frameworks/SlmEngine.xcframework
        embed: false
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
